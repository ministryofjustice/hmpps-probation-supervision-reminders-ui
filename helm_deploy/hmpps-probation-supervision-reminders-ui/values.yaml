generic-service:
  nameOverride: hmpps-probation-supervision-reminders-ui
  productId: 'HMPPS541' # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  # the IRSA service account name for accessing AWS resources
  serviceAccountName: "hmpps-probation-supervision-reminders-ui"

  replicaCount: 2

  image:
    repository: ghcr.io/ministryofjustice/hmpps-probation-supervision-reminders-ui
    tag: app_version # override at deployment time
    port: 3000

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    modsecurity_enabled: true
    modsecurity_audit_enabled: true
    modsecurity_github_team: hmpps-manage-people-on-probation
    tlsSecretName: probation-supervision-reminders-ui-cert
    modsecurity_snippet: |
      SecRuleEngine On
      SecAuditEngine On
      SecAuditLog /var/log/nginx/error.log
      SecAuditLogType Serial
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-manage-people-on-probation,tag:namespace={{ .Release.Namespace }}"
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecAction \
        "id:900000,\
         phase:1,\
         nolog,\
         pass,\
         t:none,\
         setvar:tx.paranoia_level=2"

      SecRule REQUEST_URI "@rx ^/case/[^/]+/reminders/[^/]+$" \
        "id:1001001,\
         phase:1,\
         pass,\
         nolog,\
         ctl:ruleRemoveTargetById=932200;ARGS:details,\
         ctl:ruleRemoveTargetById=932230;ARGS:details,\
         ctl:ruleRemoveTargetById=932235;ARGS:details,\
         ctl:ruleRemoveTargetById=932250;ARGS:details,\
         ctl:ruleRemoveTargetById=932231;ARGS:details,\
         ctl:ruleRemoveTargetById=932236;ARGS:details,\
         ctl:ruleRemoveTargetById=942430;ARGS:details,\
         ctl:ruleRemoveTargetById=942200;ARGS:details,\
         ctl:ruleRemoveTargetById=942360;ARGS:details,\
         ctl:ruleRemoveTargetById=942131;ARGS:details,\
         ctl:ruleRemoveTargetById=942370;ARGS:details"

  livenessProbe:
    httpGet:
      path: /ping

  readinessProbe:
    httpGet:
      path: /ping

  # Environment variables to load into the deployment
  env:
    NODE_ENV: 'production'
    REDIS_ENABLED: 'true'
    REDIS_TLS_ENABLED: 'true'
    TOKEN_VERIFICATION_ENABLED: 'true'
    AUDIT_ENABLED: "true"
    AUDIT_SQS_REGION: 'eu-west-2'
    AUDIT_SERVICE_NAME: 'HMPPS541' # Your audit service name

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    # These secrets are created by terraform.
    hmpps-probation-supervision-reminders-ui-client-creds:
      CLIENT_CREDS_CLIENT_ID: 'CLIENT_CREDS_CLIENT_ID'
      CLIENT_CREDS_CLIENT_SECRET: 'CLIENT_CREDS_CLIENT_SECRET'
    hmpps-probation-supervision-reminders-ui-auth-code:
      AUTH_CODE_CLIENT_ID: 'AUTH_CODE_CLIENT_ID'
      AUTH_CODE_CLIENT_SECRET: 'AUTH_CODE_CLIENT_SECRET'
    hmpps-probation-supervision-reminders-ui-session-secret:
      SESSION_SECRET: 'SESSION_SECRET'
    hmpps-probation-supervision-reminders-ui-elasticache-redis:
      REDIS_HOST: 'primary_endpoint_address'
      REDIS_AUTH_TOKEN: 'auth_token'
    hmpps-probation-supervision-reminders-ui-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"
      APPINSIGHTS_INSTRUMENTATIONKEY: "APPINSIGHTS_INSTRUMENTATIONKEY"
    govuk-notify:
      NOTIFY_API_KEY: 'NOTIFY_API_KEY'
    # This secret will need to be created in your namespace (note it isn't in hmpps-templates-dev)
    # IRSA configuration in your namespace will also be required, and then uncomment serviceAccountName above.
    sqs-hmpps-audit-secret:
      AUDIT_SQS_QUEUE_URL: 'sqs_queue_url'

  allowlist:
    groups:
      - digital_staff_and_mojo
      - unilink_staff
      - moj_cloud_platform
      - probation

generic-prometheus-alerts:
  targetApplication: hmpps-probation-supervision-reminders-ui
