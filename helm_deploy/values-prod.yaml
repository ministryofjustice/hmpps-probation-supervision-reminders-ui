    PROBATION_FRONTEND_COMPONENTS_CONNECT_SRC: 'https://probation-frontend-components.hmpps.service.justice.gov.uk'
    PROBATION_FRONTEND_COMPONENTS_FONT_SRC: 'https://probation-frontend-components.hmpps.service.justice.gov.uk'
    AUDIT_ENABLED: "false"
    ACCESSIBILITY: "https://probation-frontend-components.hmpps.service.justice.gov.uk/accessibility"
